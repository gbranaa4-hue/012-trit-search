name: Build OBSERVE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install sentence-transformers faiss-cpu flask torch pyinstaller
      - name: Build
        run: python build_all.py --windows
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OBSERVE-Windows
          path: dist/windows/OBSERVE.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install sentence-transformers faiss-cpu flask torch pyinstaller
      - name: Build
        run: python build_all.py --mac
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OBSERVE-Mac
          path: dist/mac/OBSERVE.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          sudo apt-get install -y python3-tk
          pip install sentence-transformers faiss-cpu flask torch pyinstaller
      - name: Build
        run: python build_all.py --linux
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OBSERVE-Linux
          path: dist/linux/OBSERVE

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            OBSERVE-Windows/OBSERVE.exe
            OBSERVE-Mac/OBSERVE.dmg
            OBSERVE-Linux/OBSERVE
          body: |
            ## OBSERVE ${{ github.ref_name }}
            Local semantic code search. Free. Private. No cloud.

            ### Download
            - **Windows**: OBSERVE.exe
            - **Mac**: OBSERVE.dmg
            - **Linux**: OBSERVE (chmod +x first)

            ### Usage
            1. Open OBSERVE
            2. Click + ADD DIR and select your codebase
            3. Click INDEX CODEBASE
            4. Search by meaning
